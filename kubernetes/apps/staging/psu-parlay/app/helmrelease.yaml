---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: psu-parlay-pr-18
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: psu-parlay-staging
  values:
    app:
      storage: "2Gi"
      image:
        repository: ghcr.io/jimmy-ungerman/psu-parlay
        tag: pr-18@sha256:92c27f0e4ca0bf883df11ab4efb89c482ebda9d1f5d3a31a78dc84ab124235f2 # updated automatically by deploy-staging workflow
    httproute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: network
      hostnames:
        - psuparlay-staging.porkboi.io
