---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: psu-parlay-pr-6
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: psu-parlay-staging
  values:
    app:
      storage: "2Gi"
      image:
        repository: ghcr.io/jimmy-ungerman/psu-parlay
        tag: pr-6@sha256:4f4902d911877e9213a57c2e6158b79c41b1afb035a1f6063777ae0f5397d2dd # updated automatically by deploy-staging workflow
    httproute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: network
      hostnames:
        - psuparlay.staging.porkboi.io
