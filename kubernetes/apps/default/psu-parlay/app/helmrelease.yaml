---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: psu-parlay
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: psu-parlay
  values:
    app:
      storage: "2Gi"
      image:
        repository: ghcr.io/jimmy-ungerman/psu-parlay
        tag: 1.0.2@sha256:ca50ddb6a023deb6e50be579703885c504b026e9e896ca024f1b67f473aeaa4e
    httproute:
      enabled: true
      parentRefs:
        - name: envoy-external
          namespace: network
      hostnames:
        - psuparlay.porkboi.io