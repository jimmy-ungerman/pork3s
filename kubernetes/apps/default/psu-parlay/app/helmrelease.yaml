---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: psu-parlay
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: psu-parlay
  values:
    app:
      storage: "2Gi"
      image:
        repository: ghcr.io/jimmy-ungerman/psu-parlay
        tag: 1.0.9@sha256:306452da0309b22a685bdff6310fc502ac9d344190e7dc5c2aa85fd1cd2711ca
    httproute:
      enabled: true
      parentRefs:
        - name: envoy-external
          namespace: network
      hostnames:
        - psuparlay.porkboi.io