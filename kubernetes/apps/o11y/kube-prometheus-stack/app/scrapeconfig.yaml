# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/scrapeconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: garage
spec:
  staticConfigs:
    - targets:
        - nas.porkboi.io:30190
  metricsPath: /metrics
  relabelings:
    - action: replace
      targetLabel: job
      replacement: garage
